# Ryan Brooks: This ConfigMap provides the runtime frontend config so the deployed React app can call the correct backend URL.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "swe645-ha3.fullname" . }}-frontend-config
data:
  config.js: |
    window.APP_CONFIG = {
      API_BASE_URL: "{{ .Values.frontend.apiBaseUrl }}"
    }
