# Ryan Brooks: This Service exposes the backend API through a NodePort so the frontend and Swagger docs can reach it.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "swe645-ha3.fullname" . }}-backend
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    app: {{ include "swe645-ha3.fullname" . }}-backend
  ports:
    - protocol: TCP
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
      nodePort: {{ .Values.backend.service.nodePort }}
