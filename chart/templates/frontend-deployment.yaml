# Ryan Brooks: This Deployment runs the React frontend container and mounts the runtime config file into Nginx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "swe645-ha3.fullname" . }}-frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "swe645-ha3.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "swe645-ha3.fullname" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: frontend-config
              mountPath: /usr/share/nginx/html/config.js
              subPath: config.js
      volumes:
        - name: frontend-config
          configMap:
            name: {{ include "swe645-ha3.fullname" . }}-frontend-config
